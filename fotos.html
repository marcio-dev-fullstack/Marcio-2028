    <title>Fotos - Márcio o Fiscal do Povo</title>
    <style>
        /* 1. RESET E FUNDO */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #002b5c; /* Azul marinho do fundo */
            color: #ffffff;
            line-height: 1.6;
        }

        /* 2. MENU HORIZONTAL (STICKY) */
        nav {
            background-color: #001f3f; 
            padding: 20px 0;
            width: 100%;
            border-bottom: 2px solid #b8860b; /* Linha dourada */
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
        }

        nav ul li a {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }

        nav ul li a:hover {
            color: #ffcc00; /* Amarelo ao passar o mouse */
        }

        /* 3. TÍTULO */
        h1 {
            text-align: center;
            margin: 40px 0;
            font-size: 2.5rem;
            color: #ffffff;
        }

        /* 4. GRADE DA GALERIA (JANELAS) */
        .galeria-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 5. ESTILO DO CARD (SEM CORTE) */
        .foto-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .foto-card:hover {
            transform: translateY(-8px);
        }

        /* AJUSTE PARA NÃO CORTAR AS FOTOS */
        .foto-card img {
            width: 100%;
            height: auto; 
            display: block;
            object-fit: contain; 
        }

        .legenda {
            padding: 15px;
            text-align: center;
            font-weight: bold;
            color: #ffcc00;
            font-size: 14px;
        }

        /* 6. RESPONSIVIDADE (CELULAR) */
        @media (max-width: 768px) {
            nav ul {
                flex-direction: column;
                gap: 15px;
                padding: 10px;
            }
            
            .galeria-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
