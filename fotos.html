<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria de Fotos - Márcio O Fiscal do Povo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- 1. RESET E FUNDO --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #002b5c; /* Fundo azul marinho para destacar as fotos */
            color: #ffffff;
            line-height: 1.6;
        }

        /* --- 2. MENU DE NAVEGAÇÃO COM LOGO (PADRÃO INDEX) --- */
        .main-nav {
            background-color: #001f3f;
            width: 100%;
            border-bottom: 3px solid #d4af37;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
        }

        .nav-logo {
            display: flex;
            align-items: center;
        }

        .logo-img {
            max-height: 60px; /* Tamanho controlado da logo */
            width: auto;
            display: block;
            transition: transform 0.3s ease;
        }

        .nav-menu {
            list-style: none;
            display: flex;
            gap: 20px;
        }

        .nav-menu li a {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            transition: 0.3s;
        }

        .nav-menu li a:hover {
            color: #ffcc00;
        }

        /* --- 3. TÍTULO DA GALERIA --- */
        .titulo-galeria {
            text-align: center;
            padding: 60px 20px 20px;
        }

        .titulo-galeria h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .titulo-galeria p {
            color: #ffcc00;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* --- 4. GRADE DA GALERIA (ESTILO CARDS) --- */
        .galeria-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 40px auto 80px;
            padding: 0 20px;
        }

        .foto-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        .foto-card:hover {
            transform: translateY(-10px);
            border-color: #ffcc00;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .foto-card img {
            width: 100%;
            height: 250px;
            object-fit: cover; /* Recorte inteligente para manter padrão */
            display: block;
        }

        .legenda {
            padding: 15px;
            text-align: center;
            font-weight: bold;
            color: #ffcc00;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.3);
        }

        /* --- 5. RODAPÉ (LARGURA TOTAL) --- */
        .footer-final {
            background-color: #001f3f;
            color: #fff;
            padding: 80px 0 40px;
            width: 100%;
            text-align: center;
            clear: both;
        }

        .footer-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .footer-titulo {
            color: #ffcc00;
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 900;
        }

        .footer-copyright {
            font-size: 0.9rem;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .footer-sociais {
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .footer-sociais a {
            color: #fff;
            font-size: 2.5rem;
            transition: 0.3s;
        }

        .footer-sociais a:hover {
            color: #ffcc00;
            transform: scale(1.1);
        }

        /* --- 6. WHATSAPP FLUTUANTE --- */
        .whatsapp-link {
            position: fixed;
            width: 65px;
            height: 65px;
            bottom: 30px;
            right: 30px;
            background-color: #25d366;
            color: #FFF;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            z-index: 2000;
            text-decoration: none;
        }

        /* RESPONSIVIDADE */
        @media (max-width: 768px) {
            .nav-menu { display: none; }
            .titulo-galeria h1 { font-size: 1.8rem; }
            .galeria-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

  <nav class="main-nav">
    <div class="nav-container">
        <div class="nav-logo">
            <a href="index.html">
                <img src="img/logo.png" alt="O Fiscal do Povo" class="logo-img">
            </a>
        </div>
        
        <div class="menu-toggle" id="mobile-menu">
          <i class="fas fa-bars"></i>
      </div>

        <ul class="nav-menu">
            <li><a href="index.html">INÍCIO</a></li>
            <li><a href="index.html#marcio">MÁRCIO</a></li>
            <li><a href="materias.html">MATÉRIAS</a></li>
            <li><a href="fotos.html">FOTOS</a></li>
        </ul>
    </div>
</nav>

    <header class="titulo-galeria">
        <h1>Galeria de Fotos</h1>
        
    </header>

    <main class="galeria-container">
        
        <div class="foto-card">
            <img src="img/00.jpg" alt="Ação 1">
            <div class="legenda">2026-2028</div>
        </div>

        <div class="foto-card">
            <img src="img/01.jpg" alt="Ação 2">
            <div class="legenda">2026-2028</div>
        </div>

        <div class="foto-card">
            <img src="img/03.png" alt="Ação 3">
            <div class="legenda">2026-2028</div>
        </div>

        <div class="foto-card">
            <img src="img/04.jpeg" alt="Ação 4">
            <div class="legenda">2026-2028</div>
        </div>

        <div class="foto-card">
            <img src="img/05.jpeg" alt="Ação 5">
            <div class="legenda">2026-2028</div>
        </div>

        <div class="foto-card">
            <img src="img/08.jpg" alt="Ação 6">
            <div class="legenda">2026-2028</div>
        </div>

    </main>

    <footer class="footer-final">
        <div class="footer-container">
            <h2 class="footer-titulo">MÁRCIO O FISCAL DO POVO</h2>
            <p class="footer-copyright">© 2026 Todos os direitos reservados. Conceição do Araguaia - PA</p>
            
            <div class="footer-sociais">
                <a href="https://wa.me/5594992500073" target="_blank"><i class="fab fa-whatsapp"></i></a>
                <a href="https://facebook.com/MarcioFiscalDoPovo" target="_blank"><i class="fab fa-facebook"></i></a>
                <a href="https://instagram.com/marcioofiscaldopovo/" target="_blank"><i class="fab fa-instagram"></i></a>
                <a href="https://youtube.com/@MarcioFiscalDoPovo" target="_blank"><i class="fab fa-youtube"></i></a>
            </div>
        </div>
    </footer>

    <a href="https://wa.me/5594992500073" class="whatsapp-link" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>
    <script>
      // Selecionamos o botão pelo ID e o menu pela CLASSE
      const menuBtn = document.getElementById('mobile-menu');
      const navMenu = document.querySelector('.nav-menu');
  
      if(menuBtn) {
          menuBtn.addEventListener('click', function() {
              console.log("Botão clicado!"); // Se aparecer isso no console, o JS está ok
              navMenu.classList.toggle('active');
              
              // Troca o ícone
              const icon = this.querySelector('i');
              icon.classList.toggle('fa-bars');
              icon.classList.toggle('fa-times');
          });
      }
  
      // Fecha ao clicar em qualquer link
      document.querySelectorAll('.nav-menu a').forEach(link => {
          link.addEventListener('click', () => {
              navMenu.classList.remove('active');
              const icon = menuBtn.querySelector('i');
              icon.classList.add('fa-bars');
              icon.classList.remove('fa-times');
          });
      });
  </script>
</body>
</html>
