<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos - Márcio O Fiscal do Povo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .videos-section { background: #000; padding: 20px 10px; }
        .videos-grid {
            display: flex;
            flex-direction: column;
            gap: 40px;
            max-width: 500px; 
            margin: 0 auto;
        }
        .video-header {
            margin-bottom: 10px;
            border-left: 4px solid #4facfe;
            padding-left: 15px;
        }
        .video-title {
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            display: block;
            text-transform: uppercase;
        }
        .video-date {
            color: #4facfe;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .video-placeholder {
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            height: 600px;
            border-radius: 15px;
            border: 2px solid #333;
            transition: 0.3s;
        }
        .video-placeholder:hover { border-color: #4facfe; }
        .video-placeholder i { font-size: 50px; color: #4facfe; margin-bottom: 10px; }
        .video-placeholder span { color: #fff; font-size: 12px; font-weight: 700; }
        .video-active { width: 100%; height: 600px; border-radius: 15px; overflow: hidden; }
    </style>
</head>
<body>

    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-logo">MENU</div>
            <button class="mobile-menu-btn" id="menu-btn"><i class="fas fa-bars"></i></button>
            <ul class="nav-menu" id="nav-menu">
                <li><a href="index.html#inicio">INÍCIO</a></li>
                <li><a href="index.html#marcio">MÁRCIO</a></li>
                <li><a href="index.html#aline">ALINE</a></li>
                <li><a href="index.html#propostas">PROPOSTAS</a></li>
                <li><a href="videos.html">VÍDEOS</a></li>
            </ul>
        </div>
    </nav>

    <section class="videos-section">
        <h2 class="section-title-premium" style="text-align: center; color: #4facfe; margin-bottom: 30px;">FISCALIZAÇÃO EM AÇÃO</h2>
        
        <div class="videos-grid" id="container-videos">
            </div>
    </section>

    <script>
        // MATRIZ DE VÍDEOS (URL, TÍTULO, DATA)
        const videosData = [
            { url: "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/61584229254460/videos/1790105011949511/&show_text=false", title: "Fiscalização Geral", date: "Março 2026" },
            { url: "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/reel/1311500697698154/&show_text=false", title: "Fiscalização Saúde", date: "Fevereiro 2026" },
            { url: "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/reel/1255227905934165/&show_text=false", title: "Ação nos Bairros", date: "Fevereiro 2026" },
            // ... Adicione os demais 54 objetos aqui seguindo o padrão { url: "", title: "", date: "" }
            { url: "https://www.youtube.com/embed/eVw85yaH-UM?autoplay=1", title: "Resumo da Semana", date: "Janeiro 2026" }
        ];

        const container = document.getElementById('container-videos');

        videosData.forEach((vid, index) => {
            const div = document.createElement('div');
            div.className = 'video-item';
            div.innerHTML = `
                <div class="video-header">
                    <span class="video-title">${vid.title} #${index + 1}</span>
                    <span class="video-date"><i class="far fa-calendar-alt"></i> ${vid.date}</span>
                </div>
                <div class="video-placeholder" onclick="playVid(this, '${vid.url}')">
                    <i class="fas fa-play-circle"></i>
                    <span>CLIQUE PARA ASSISTIR</span>
                </div>
            `;
            container.appendChild(div);
        });

        function playVid(el, url) {
            el.parentElement.innerHTML = `
                <div class="video-active">
                    <iframe src="${url}" width="100%" height="600" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe>
                </div>
            `;
        }
    </script>

    <footer class="main-footer" style="background: #001a33; padding: 40px; text-align: center; border-top: 4px solid #d4af37;">
        <a href="index.html" style="color: #d4af37; text-decoration: none; font-weight: 800; border: 1px solid #d4af37; padding: 10px 20px; border-radius: 5px;">← VOLTAR AO INÍCIO</a>
    </footer>

</body>
</html>
