<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos - Márcio O Fiscal do Povo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .video-placeholder {
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            min-height: 450px;
            border-radius: 12px;
            border: 2px solid #333;
            transition: 0.3s;
        }
        .video-placeholder:hover { border-color: #4facfe; background: #1a1a1a; }
        .video-placeholder i { font-size: 60px; color: #4facfe; margin-bottom: 15px; }
        .video-placeholder span { color: #fff; font-size: 12px; font-weight: 800; letter-spacing: 1px; }
        
        /* Container para manter o aspecto do vídeo após o clique */
        .video-container-active {
            width: 100%;
            height: 450px;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }
    </style>
</head>
<body style="background: #000;">

    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-logo">MENU</div>
            <button class="mobile-menu-btn" id="menu-btn"><i class="fas fa-bars"></i></button>
            <ul class="nav-menu" id="nav-menu">
                <li><a href="index.html#inicio">INÍCIO</a></li>
                <li><a href="index.html#marcio">MÁRCIO</a></li>
                <li><a href="index.html#aline">ALINE</a></li>
                <li><a href="index.html#propostas">PROPOSTAS</a></li>
                <li><a href="videos.html">VÍDEOS</a></li>
            </ul>
        </div>
    </nav>

    <section class="videos-section" style="padding: 40px 20px;">
        <div class="container-biografia" style="max-width: 1400px; width: 100%; margin: 0 auto;">
            <h2 class="section-title-premium" style="text-align: center; color: #4facfe; margin-bottom: 40px;">FISCALIZAÇÃO EM AÇÃO</h2>
            
            <div class="videos-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
                <div class="video-item" id="vid-1">
                    <div class="video-placeholder" onclick="loadVideo('vid-1', 'https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/61584229254460/videos/1790105011949511/&show_text=false')">
                        <i class="fab fa-facebook"></i>
                        <span>ASSISTIR VÍDEO</span>
                    </div>
                </div>

                <div class="video-item" id="vid-2">
                    <div class="video-placeholder" onclick="loadVideo('vid-2', 'https://www.youtube.com/embed/eVw85yaH-UM?autoplay=1')">
                        <i class="fab fa-youtube"></i>
                        <span>ASSISTIR YOUTUBE</span>
                    </div>
                </div>
                
                </div>
        </div>
    </section>

    <footer class="main-footer" style="background: #001a33; padding: 40px; text-align: center;">
        <a href="index.html" style="color: #d4af37; text-decoration: none; font-weight: 800; border: 1px solid #d4af37; padding: 12px 25px; border-radius: 5px;">← VOLTAR AO INÍCIO</a>
    </footer>

    <script>
        function loadVideo(containerId, iframeUrl) {
            const container = document.getElementById(containerId);
            const isYouTube = iframeUrl.includes('youtube.com');
            
            let html = '';
            if (isYouTube) {
                html = `<iframe src="${iframeUrl}" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen style="width:100%; height:450px; border-radius:12px;"></iframe>`;
            } else {
                // Ajuste específico para o plugin do Facebook carregar corretamente
                html = `<iframe src="${iframeUrl}" width="100%" height="450" style="border:none;overflow:hidden;border-radius:12px;" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share"></iframe>`;
            }
            
            container.innerHTML = `<div class="video-container-active">${html}</div>`;
        }
    </script>
</body>
</html>
