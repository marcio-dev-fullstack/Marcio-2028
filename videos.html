    <style>
        :root {
            --primary: #FFD700;
            --bg-dark: #0f111a;
            --card-bg: #1a1d29;
            --text-light: #ffffff;
            --text-muted: #a0a0a0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #000;
            padding: 20px 0;
            border-bottom: 2px solid var(--primary);
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
            text-transform: uppercase;
        }

        nav a.active { color: var(--primary); }

        .container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Grid Responsivo: 4 colunas no PC, 1 no Mobile */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 colunas no PC */
            gap: 20px;
        }

        /* Ajuste para Tablet (2 colunas) */
        @media (max-width: 1024px) {
            .video-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* Ajuste para Mobile (1 coluna) */
        @media (max-width: 600px) {
            .video-grid { grid-template-columns: 1fr; }
        }

        .video-card {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 20px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        .video-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .video-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .video-icon { font-size: 24px; color: var(--primary); }

        .video-title {
            font-size: 14px;
            font-weight: bold;
            color: var(--primary);
        }

        .video-desc {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.4;
            min-height: 40px;
        }

        .btn-assistir {
            background-color: var(--primary);
            color: #000;
            text-align: center;
            padding: 12px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            transition: background 0.3s;
            margin-top: auto;
        }

        .btn-assistir:hover { background-color: #e6c200; }

        footer {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 14px;
        }
    </style>
