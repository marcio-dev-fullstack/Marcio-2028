        const grid = document.getElementById('video-grid');

        vids.forEach((video, index) => {
            const card = document.createElement('div');
            card.className = "bg-gray-900 rounded-md overflow-hidden shadow border border-gray-800 hover:border-blue-900 transition-colors duration-300 flex flex-col relative";
            
            let embedUrl = "";
            const videoNumber = vids.length - index;

            if (video.url.includes("youtube.com") || video.url.includes("youtu.be")) {
                let id = "";
                if(video.url.includes("shorts/")) id = video.url.split("shorts/")[1].split("?")[0];
                else if(video.url.includes("v=")) id = video.url.split("v=")[1].split("&")[0];
                embedUrl = `https://www.youtube.com/embed/${id}?controls=0&modestbranding=1&rel=0`;
            } else if (video.url.includes("facebook.com")) {
                embedUrl = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(video.url)}&show_text=0&controls=0`;
            }

            const isFbVideo = video.url.includes('videos');

            card.innerHTML = `
                <div class="video-wrapper ${isFbVideo ? 'fb-video-wrapper' : ''} flex-grow">
                    <iframe src="${embedUrl}" allowfullscreen allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share" loading="lazy" class="relative z-0"></iframe>
                    <div class="absolute top-0 left-0 w-full p-2.5 z-10 text-overlay rounded-t-md">
                        <p class="text-yellow-500 font-bold text-[10px] uppercase tracking-wider">Vídeo ${videoNumber}</p>
                        ${video.title ? `<h3 class="text-xs font-semibold text-white mt-0.5 line-clamp-1">${video.title}</h3>` : ''}
                    </div>
                </div>
                <div class="p-2 border-t border-gray-800 bg-gray-900 relative z-20">
                    <a href="${video.url}" target="_blank" class="text-[11px] text-gray-400 hover:text-blue-400 transition block text-center uppercase font-bold tracking-tighter">
                        Ver Original <i class="fas fa-external-link-alt ml-1 text-[9px]"></i>
                    </a>
                </div>
            `;
            grid.appendChild(card);
        });
