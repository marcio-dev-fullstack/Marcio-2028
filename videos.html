        .video-card {

            overflow: hidden;

            height: 600px; /* Altura ideal para Reels e Shorts verticais */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .video-card iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* RESPONSIVIDADE */
        @media (max-width: 1200px) { .videos-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { 
            nav ul { flex-direction: column; align-items: center; gap: 10px; }
            .videos-container { grid-template-columns: 1fr; }

        function getEmbedUrl(originalUrl) {
            if (originalUrl.includes("youtube.com/shorts/")) {
                return originalUrl.replace("youtube.com/shorts/", "youtube.com/embed/");
            }
            if (originalUrl.includes("youtube.com/watch?v=")) {
                return originalUrl.replace("watch?v=", "embed/");
            }
            if (originalUrl.includes("facebook.com")) {
                return "https://www.facebook.com/plugins/video.php?href=" + encodeURIComponent(originalUrl) + "&show_text=0";
            }
            return originalUrl;
        }

        const container = document.getElementById('videoGrid');
        vids.forEach(vid => {
            const embedUrl = getEmbedUrl(vid.url);
            const card = document.createElement('div');
            card.className = 'video-card';
