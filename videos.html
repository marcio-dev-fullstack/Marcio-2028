<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos - Márcio O Fiscal do Povo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .videos-section { 
            background: #000; 
            padding: 100px 20px 60px 20px; /* Aumentado padding topo para não colar no menu */
            min-height: 100vh; 
        }
        
        /* Título Centralizado com Destaque */
        .section-header {
            text-align: center;
            margin-bottom: 50px;
            width: 100%;
        }
        
        .section-title-premium {
            font-size: 2.5rem;
            color: #4facfe;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            display: inline-block;
            border-bottom: 3px solid #d4af37;
            padding-bottom: 10px;
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 1100px) { .videos-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 650px) { 
            .videos-grid { grid-template-columns: 1fr; } 
            .section-title-premium { font-size: 1.8rem; }
        }

        .video-header { margin-bottom: 8px; border-left: 3px solid #4facfe; padding-left: 10px; }
        .video-title { color: #fff; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .video-date { color: #4facfe; font-size: 0.7rem; }

        .video-placeholder {
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            height: 400px;
            border-radius: 10px;
            border: 1px solid #333;
            transition: 0.3s;
        }
        .video-placeholder:hover { border-color: #4facfe; background: #1a1a1a; transform: translateY(-5px); }
        .video-placeholder i { font-size: 45px; color: #4facfe; margin-bottom: 10px; }
        .video-placeholder span { color: #fff; font-size: 11px; font-weight: 800; }

        .video-active { width: 100%; height: 400px; border-radius: 10px; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-logo">MENU</div>
            <button class="mobile-menu-btn" id="menu-btn"><i class="fas fa-bars"></i></button>
            <ul class="nav-menu" id="nav-menu">
                <li><a href="index.html#inicio">INÍCIO</a></li>
                <li><a href="index.html#marcio">MÁRCIO</a></li>
                <li><a href="index.html#aline">ALINE</a></li>
                <li><a href="index.html#propostas">PROPOSTAS</a></li>
                <li><a href="videos.html">VÍDEOS</a></li>
            </ul>
        </div>
    </nav>

    <section class="videos-section">
        <div class="section-header">
            <h2 class="section-title-premium">FISCALIZAÇÃO EM AÇÃO</h2>
        </div>
        <div class="videos-grid" id="main-grid"></div>
    </section>

    <script>
        const vids = [
            "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/61584229254460/videos/1790105011949511/&show_text=false",
            // ... (os demais links permanecem aqui)
            "https://www.facebook.com/plugins/video.php?href=https://www.facebook.com/reel/838948629033710/&show_text=false"
        ];

        const grid = document.getElementById('main-grid');
        vids.forEach((url, i) => {
            const item = document.createElement('div');
            item.className = 'video-item';
            item.innerHTML = `
                <div class="video-header">
                    <span class="video-title">Fiscalização #${i + 1}</span>
                    <span class="video-date">Março 2026</span>
                </div>
                <div class="video-placeholder" onclick="loadVideo(this, '${url}')">
                    <i class="fas fa-play-circle"></i>
                    <span>ASSISTIR</span>
                </div>
            `;
            grid.appendChild(item);
        });

        function loadVideo(el, url) {
            el.parentElement.innerHTML = `
                <div class="video-active">
                    <iframe src="${url}" allowfullscreen="true" allow="autoplay; encrypted-media"></iframe>
                </div>
            `;
        }
    </script>

    <footer class="main-footer" style="background: #001a33; padding: 60px 20px; border-top: 5px solid #d4af37; text-align: center;">
        <div style="max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; align-items: center;">
            <h2 style="color: #d4af37; font-size: 1.8rem; font-weight: 900; margin-bottom: 10px; text-transform: uppercase;">Márcio O Fiscal do Povo</h2>
            <p style="color: white; margin-bottom: 30px;">© 2026 Todos os direitos reservados. Conceição do Araguaia - PA</p>
            <div style="display: flex; gap: 30px; flex-wrap: wrap; justify-content: center;">
                <a href="https://wa.me/5594992500073" target="_blank" style="color: white; font-size: 2.5rem;"><i class="fab fa-whatsapp"></i></a>
                <a href="https://www.facebook.com/MarcioFiscalDoPovo" target="_blank" style="color: white; font-size: 2.5rem;"><i class="fab fa-facebook"></i></a>
                <a href="https://www.instagram.com/marcioofiscaldopovo/" target="_blank" style="color: white; font-size: 2.5rem;"><i class="fab fa-instagram"></i></a>
                <a href="https://www.youtube.com/@MarcioFiscalDoPovo" target="_blank" style="color: white; font-size: 2.5rem;"><i class="fab fa-youtube"></i></a>
            </div>
        </div>
    </footer>

</body>
</html>
