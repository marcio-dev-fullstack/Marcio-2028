    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

        :root {
            --azul-marinho: #001220;
            --dourado: #f1c40f;
        }
        .bg-custom-blue { background-color: var(--azul-marinho); }
        .text-custom-gold { color: var(--dourado); }
        .border-custom-gold { border-color: var(--dourado); }

        .video-wrapper { 
            position: relative; 
            padding-bottom: 177.77%; 
            height: 0; 
            overflow: hidden; 
            background: #000; 
        }
        .video-wrapper iframe { 
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%; 
            border: none; 
        }
        .fb-video-wrapper { padding-bottom: 100%; }
        .text-overlay { 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); 
        }
        /* Ajuste para o conteúdo não ficar escondido sob o menu fixo */
        body { padding-top: 120px; } 
    </style>
</head>

            <p class="text-sm opacity-80 mb-10">© 2026 Todos os direitos reservados. Conceição do Araguaia - PA</p>

        ];

        const grid = document.getElementById('video-grid');

        vids.forEach((video, index) => {
            const card = document.createElement('div');
            card.className = "bg-white rounded-md overflow-hidden shadow-lg border border-gray-200 flex flex-col relative";
            
            let embedUrl = "";
            const videoNumber = vids.length - index;

            if (video.url.includes("youtube.com") || video.url.includes("youtu.be")) {
                let id = "";
                if(video.url.includes("shorts/")) id = video.url.split("shorts/")[1].split("?")[0];
                else if(video.url.includes("v=")) id = video.url.split("v=")[1].split("&")[0];
                embedUrl = `https://www.youtube.com/embed/${id}?controls=0&modestbranding=1&rel=0`;
            } else if (video.url.includes("facebook.com")) {
                embedUrl = `https://www.facebook.com/plugins/video.php?href=${encodeURIComponent(video.url)}&show_text=0&controls=0`;
            }

            const isFbVideo = video.url.includes('videos');

            card.innerHTML = `
                <div class="video-wrapper ${isFbVideo ? 'fb-video-wrapper' : ''} flex-grow">
                    <iframe src="${embedUrl}" allowfullscreen loading="lazy"></iframe>
                    <div class="absolute top-0 left-0 w-full p-2 z-10 text-overlay rounded-t-md">
                        <p class="text-custom-gold font-bold text-[9px] uppercase tracking-widest">Vídeo ${videoNumber}</p>
                        ${video.title ? `<h3 class="text-[10px] font-bold text-white mt-0.5 line-clamp-1 uppercase">${video.title}</h3>` : ''}
                    </div>
                </div>
                <div class="p-1.5 bg-white relative z-20">
                    <a href="${video.url}" target="_blank" class="text-[9px] text-custom-blue block text-center uppercase font-black tracking-tighter hover:text-custom-gold transition">Link Original</a>
                </div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
