        .video-placeholder {

            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            height: 450px;
            border-radius: 12px;
            border: 2px solid #333;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }
        .video-placeholder::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: 1; }
        .video-placeholder:hover { border-color: #4facfe; transform: translateY(-5px); }
        .video-placeholder i { font-size: 60px; color: #4facfe; z-index: 2; margin-bottom: 10px; }
        .video-placeholder span { color: #fff; font-size: 12px; font-weight: 800; z-index: 2; }

        .video-active { width: 100%; height: 450px; border-radius: 12px; overflow: hidden; background: #000; }
