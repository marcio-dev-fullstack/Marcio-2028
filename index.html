<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal do Fiscal do Povo</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@900&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a3a5c;
            --secondary: #c9a227;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: 'Open Sans', sans-serif;
            overflow: hidden; /* Evita scroll desnecessário na entrada */
        }

        /* FUNDO POLÍTICO COM OVERLAY ESCURO */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(15, 31, 46, 0.85)), 
                        url('https://images.unsplash.com/photo-1529107386315-e1a2ed48a620?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80'); /* Imagem de colunas/tribuna */
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
            text-align: center;
        }

        .logo-area {
            margin-bottom: 40px;
        }

        .logo-area h1 {
            color: var(--white);
            font-family: 'Merriweather', serif;
            font-size: 1.8rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }

        .logo-area p {
            color: var(--secondary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
        }

        /* ESTILO DOS CARDS */
        .card-link {
            width: 100%;
            max-width: 350px;
            background: rgba(255, 255, 255, 0.1); /* Efeito Vidro */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 25px 20px;
            margin-bottom: 20px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card-link:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.2);
        }

        .icon-box {
            width: 50px;
            height: 50px;
            background: var(--secondary);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 1.5rem;
            flex-shrink: 0;
        }

        .text-box {
            text-align: left;
        }

        .text-box h2 {
            color: var(--white);
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .text-box p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
        }

        .footer-text {
            position: absolute;
            bottom: 30px;
            color: rgba(255,255,255,0.4);
            font-size: 0.7rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="container">
        
        <div class="logo-area">
            <h1>PORTAL DE NOTÍCIAS POLÍTICA</h1>
            <p>Fiscalização com Responsabilidade</p>
        </div>

        <a href="https://marcioofiscaldopovo.com.br/blog-do-professor-marcio/index.html" class="card-link">
          <div class="icon-box">
              <i class="fas fa-newspaper"></i>
          </div>
          <div class="text-box">
              <h2>Blog do Professor Márcio</h2>
              <p>Análises políticas e fiscalização de CDA</p>
          </div>
          <i class="fas fa-chevron-right" style="color: rgba(255,255,255,0.3); margin-left: auto;"></i>
      </a>

        <a href="https://marcioofiscaldopovo.com.br/marcio-o-fiscal-do-povo/index.html" class="card-link">
            <div class="icon-box">
                <i class="fas fa-user-shield"></i>
            </div>
            <div class="text-box">
                <h2>Márcio o Fiscal do Povo</h2>
                <p>Conheça minha trajetória e propostas</p>
            </div>
            <i class="fas fa-chevron-right" style="color: rgba(255,255,255,0.3); margin-left: auto;"></i>
        </a>

        <div class="footer-text">
            © 2026 • Conceição do Araguaia - PA
        </div>

    </div>

</body>
</html>
